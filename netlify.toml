[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Don't fail Netlify build if Sentry plugin can't reach Sentry API
  SENTRY_LOG_LEVEL = "error"

# Next.js plugin handles routing, ISR, image optimisation, server components, etc.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ───────────────────────────────────────
# Scheduled Functions  (Netlify equivalent of Vercel cron)
# Each one pings the corresponding Next.js API route on a schedule.
# ───────────────────────────────────────
[functions."weekly-digest-cron"]
  schedule = "0 9 * * 1"

[functions."daily-digest-cron"]
  schedule = "0 8 * * *"

# ───────────────────────────────────────
# Headers
# ───────────────────────────────────────
[[headers]]
  for = "/api/cron/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, immutable"

# ───────────────────────────────────────
# SPA-style fallback for client-routed pages
# Netlify's Next plugin handles routing automatically; this is a safety net.
# ───────────────────────────────────────
[[redirects]]
  from = "/sentry-tunnel"
  to = "/api/sentry-tunnel"
  status = 200
  force = false
